<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voice AI Assistant</h1>
            <p>Real-time, low-latency conversational AI</p>
        </header>

        <main>
            <div class="status-panel">
                <div id="connection-status" class="status-indicator offline">
                    <span class="dot"></span>
                    <span class="text">Disconnected</span>
                </div>
                <div id="ai-status" class="ai-status">Ready</div>
            </div>

            <div class="controls">
                <button id="btn-start" class="btn primary">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                    Start Conversation
                </button>
                <button id="btn-stop" class="btn secondary" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    Stop Call
                </button>
            </div>

            <div class="transcript-container">
                <h3>Conversation Log</h3>
                <div id="transcript" class="transcript">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Main application script -->
    <script src="app.js"></script>
</body>
</html>
